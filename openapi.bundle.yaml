components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GenericErrorResponse:
      oneOf:
        - type: object
          required:
            - ok
            - message
          properties:
            ok:
              type: boolean
              example: false
            message:
              type: string
        - type: object
          required:
            - message
            - ok
            - status
          properties:
            message:
              type: string
            ok:
              type: boolean
              example: false
            status:
              type: integer
            item:
              nullable: true
            code:
              type: string
    manage-event.request.schema:
      type: object
      additionalProperties: true
      required:
        - type
        - idCompany
        - idWorkspace
        - startDate
        - services
        - clients
      properties:
        type:
          type: string
          enum:
            - event
        mode:
          type: string
          enum:
            - create
            - edit
            - view
          description: Client/editor mode from platform sidebar.
        idGroup:
          type: string
          format: uuid
          description: Existing booking group id. Optional when creating.
        idCompany:
          type: string
          format: uuid
        idWorkspace:
          type: string
          format: uuid
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        sendNotification:
          type: boolean
          enum:
            - false
          default: false
        description:
          type: string
        eventStatusType:
          type: string
          enum:
            - PENDING
            - ACCEPTED
            - CONFIRMED
            - COMPLETED
