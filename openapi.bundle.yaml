        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/events/client-cancel:
    post:
      tags:
        - Event Client
      summary: Cancel client appointment
      description: Cancels the booking for the authenticated client. `status` must be `CANCELLED_BY_CLIENT`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCancelRequest'
            examples:
              cancel:
                value:
                  idCompany: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                  idWorkspace: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
                  customer:
                    id: a2a81aad-d012-41b8-8c4e-aa5c2e6aa356
                  idEvent: 3c95251f-eb0b-407b-b7d7-e76976fb7d04
                  status: CANCELLED_BY_CLIENT
      responses:
        '200':
          description: Appointment cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/events/client-confirm:
    post:
      tags:
        - Event Client
      summary: Confirm client appointment
      description: Confirms the booking for the authenticated client. `status` must be `CONFIRMED`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientConfirmRequest'
            examples:
              confirm:
                value:
                  idCompany: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                  idWorkspace: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
                  customer:
                    id: a2a81aad-d012-41b8-8c4e-aa5c2e6aa356
                  idEvent: 3c95251f-eb0b-407b-b7d7-e76976fb7d04
                  status: CONFIRMED
      responses:
        '200':
          description: Appointment confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/business-hours/add:
    post:
      tags:
        - Schedules
      summary: Create business hours
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessHourAddRequest'
            examples:
              mondaySlot:
                summary: Real payload - business hour add
                value:
                  weekDayType: MONDAY
                  startTime: '16:00'
