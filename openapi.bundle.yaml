openapi: 3.0.3
info:
  title: MS Calendar API
  version: 1.0.0
  description: OpenAPI spec split by feature.
servers:
  - url: http://localhost:3201
    description: Local development
  - url: http://localhost:3299/calendar
    description: Local API gateway (prefix /calendar)
tags:
  - name: Demo
    description: Helpers to test protected endpoints quickly in development
  - name: Event Platform
    description: Platform-side event management
  - name: Event Client
    description: Client-side booking flow (create, edit, list, confirm, cancel)
  - name: Schedules
    description: Business/worker hours, temporary exceptions, and worker absences
paths:
  /api/demo/token:
    get:
      tags:
        - Demo
      summary: Generate demo JWT token
      description: Development-only endpoint. Returns a ready-to-use JWT so evaluators can authorize protected endpoints directly from Swagger UI.
      parameters:
        - in: query
          name: expiresIn
          required: false
          schema:
            type: string
            example: 2h
          description: JWT expiration (example 2h, 30m, 1d).
      responses:
        '200':
          description: Demo token generated
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - token
                  - claims
                  - authorizationHeader
                properties:
                  ok:
                    type: boolean
                    example: true
                  token:
                    type: string
                  claims:
                    type: object
                    required:
                      - idUser
                      - idCompanySelected
                      - role
                    properties:
                      idUser:
                        type: string
                        format: uuid
                      idCompanySelected:
                        type: string
                        format: uuid
                      role:
                        type: string
                        example: ROLE_OWNER
                  authorizationHeader:
                    type: string
                    example: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '404':
          description: Not available outside development environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Missing JWT configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/events/v2/platform/manage-event:
    post:
      tags:
        - Event Platform
      summary: Create or update a booking group from platform sidebar
      description: |
        Upserts events for a booking group. Optional query params let you choose worker, start slot (15-minute increments), and event status. `sendNotification` is forced to `false` by backend.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: worker
          required: false
          schema:
            type: string
            enum:
              - David
              - Grabiella
              - Scott
          description: Assign this worker to all services.
        - in: query
          name: startSlot
          required: false
          schema:
            type: string
            enum:
              - '08:00'
              - '08:15'
              - '08:30'
              - '08:45'
              - '09:00'
              - '09:15'
              - '09:30'
              - '09:45'
              - '10:00'
              - '10:15'
              - '10:30'
              - '10:45'
              - '11:00'
              - '11:15'
              - '11:30'
              - '11:45'
              - '12:00'
              - '12:15'
              - '12:30'
              - '12:45'
              - '13:00'
              - '13:15'
              - '13:30'
              - '13:45'
              - '14:00'
              - '14:15'
              - '14:30'
              - '14:45'
              - '15:00'
              - '15:15'
              - '15:30'
              - '15:45'
              - '16:00'
              - '16:15'
              - '16:30'
              - '16:45'
              - '17:00'
              - '17:15'
              - '17:30'
              - '17:45'
              - '18:00'
              - '18:15'
              - '18:30'
              - '18:45'
              - '19:00'
              - '19:15'
              - '19:30'
              - '19:45'
              - '20:00'
          description: Start time in 15-minute slots.
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
            example: '2026-02-20'
          description: Date used together with `startSlot`.
        - in: query
          name: eventStatusType
          required: false
          schema:
            type: string
            enum:
              - PENDING
              - ACCEPTED
              - CONFIRMED
              - COMPLETED
              - CANCELLED
              - CANCELLED_BY_CLIENT
              - CANCELLED_BY_CLIENT_REMOVED
              - PAID
              - NO_SHOW
          description: Optional event status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/manage-event.request.schema'
            examples:
              createBooking:
                summary: Create booking
                value:
                  type: event
                  mode: create
                  idCompany: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                  idWorkspace: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
                  startDate: '2026-02-20T10:00:00.000Z'
                  endDate: '2026-02-20T11:30:00.000Z'
                  sendNotification: true
                  commentClient: Cliente prefiere profesional senior
                  services:
                    - idService: dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb
                      duration: 60
                      name: Haircut
                      price: 25
                      discount: 0
                      idWorker: 2917f4e1-3e9e-4868-a1f0-fc4f26fbf531
                  clients:
                    - idClient: a2a81aad-d012-41b8-8c4e-aa5c2e6aa356
                      idClientWorkspace: 33f6cd95-1524-4167-b882-f3118ea2ccf6
              editBooking:
                summary: Edit booking
                value:
                  type: event
                  mode: edit
                  idGroup: c8494d36-0f56-4247-a83d-72ce5659526c
                  idCompany: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                  idWorkspace: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
                  startDate: '2026-02-20T11:00:00.000Z'
                  endDate: '2026-02-20T12:30:00.000Z'
                  sendNotification: false
                  services:
                    - idEvent: f0ec4583-6d20-4e89-a267-799fd4f10871
                      idService: dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb
                      duration: 90
                      name: Color
                      price: 40
                      discount: 5
                      idWorker: 2917f4e1-3e9e-4868-a1f0-fc4f26fbf531
                  clients:
                    - idClient: a2a81aad-d012-41b8-8c4e-aa5c2e6aa356
                      idClientWorkspace: 33f6cd95-1524-4167-b882-f3118ea2ccf6
      responses:
        '200':
          description: Booking managed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/manage-event.success.response.schema'
              examples:
                success:
                  value:
                    message: Eventos creados exitosamente
                    ok: true
                    status: 200
                    item:
                      count: 1
                      events:
                        - id: f0ec4583-6d20-4e89-a267-799fd4f10871
                          idGroup: c8494d36-0f56-4247-a83d-72ce5659526c
                          idCompanyFk: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                          idWorkspaceFk: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
        '400':
          description: Invalid request payload or business validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic-error.response.schema'
              examples:
                validationFromMiddleware:
                  value:
                    ok: false
                    message: 'type: Invalid literal value, expected "event"'
                validationFromController:
                  value:
                    message: El campo 'services' debe ser un array
                    ok: false
                    status: 400
                    item: null
                    code: MSCAL402
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic-error.response.schema'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic-error.response.schema'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/generic-error.response.schema'
  /api/events/client-web/appointments:
    post:
      tags:
        - Event Client
      summary: Get client appointments (upcoming or past)
      description: Returns bookings for the authenticated client in a workspace.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientAppointmentsRequest'
            examples:
              upcoming:
                value:
                  idCompany: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                  idWorkspace: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
                  customer:
                    id: a2a81aad-d012-41b8-8c4e-aa5c2e6aa356
                  scope: upcoming
                  page: 1
                  itemsPerPage: 10
      responses:
        '200':
          description: Client appointments found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Invalid payload or booking guard error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/events/client-web/appointments/{id}:
    post:
      tags:
        - Event Client
      summary: Get one appointment by booking id
      description: Returns one grouped booking for the authenticated client.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Booking id (group id)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientAppointmentByIdRequest'
            examples:
              byId:
                value:
                  idCompany: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                  idWorkspace: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
                  customer:
                    id: a2a81aad-d012-41b8-8c4e-aa5c2e6aa356
                  id: c8494d36-0f56-4247-a83d-72ce5659526c
      responses:
        '200':
          description: Appointment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Invalid payload or booking guard error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '404':
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/events/client-web/available-days:
    post:
      tags:
        - Event Client
      summary: Get available days for client booking
      description: Use the same workspace/company where business hours were created. If `staffId` is provided and not eligible, all days can return as `dayoff`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientAvailableDaysRequest'
            examples:
              usingYourWorkspace:
                summary: Workspace/company with business hours already loaded
                value:
                  idCompany: 9f89db3a-4eb8-4d95-80a4-6ed31c65285a
                  idWorkspace: 2e9c6bcf-5d06-4af4-b85f-df4f4f0297f9
                  idBookingPage: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  timezone: Europe/Madrid
                  range:
                    start: '2026-02-23'
                    end: '2026-03-19'
                  attendees:
                    - serviceId: dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb
                      durationMin: 60
              mockWorkspace:
                summary: Default mock context
                value:
                  idCompany: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                  idWorkspace: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
                  idBookingPage: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  timezone: Europe/Madrid
                  range:
                    start: '2026-02-23'
                    end: '2026-03-19'
                  attendees:
                    - serviceId: dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb
                      durationMin: 60
      responses:
        '200':
          description: Available days returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/events/client-web/available-times:
