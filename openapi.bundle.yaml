      summary: Get available time slots for client booking
      description: For deterministic tests, start without `staffId` and use a workspace that has business/worker/temporary hours configured.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientAvailableTimesRequest'
            examples:
              usingYourWorkspace:
                summary: Workspace/company with business hours already loaded
                value:
                  idCompany: 9f89db3a-4eb8-4d95-80a4-6ed31c65285a
                  idWorkspace: 2e9c6bcf-5d06-4af4-b85f-df4f4f0297f9
                  idBookingPage: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  date: '2026-02-23'
                  timezone: Europe/Madrid
                  attendees:
                    - serviceId: dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb
                      durationMin: 60
              mockWorkspace:
                summary: Default mock context
                value:
                  idCompany: 2fd3e7b0-10d1-45bf-80d4-00f92ff97a31
                  idWorkspace: 29f8a525-d3f2-4bc2-89bb-f0f1f1958de9
                  idBookingPage: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  date: '2026-02-23'
                  timezone: Europe/Madrid
                  attendees:
                    - serviceId: dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb
                      durationMin: 60
      responses:
        '200':
          description: Available times returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
