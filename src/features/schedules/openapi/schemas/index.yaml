WeekDayType:
  type: string
  enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]

EventPurposeType:
  type: string
  enum: [APPOINTMENT, VACATION, SICK_LEAVE, PERSONAL_DAY, UNPAID_LEAVE, TEMPORARY_BLOCK, OTHER]

IdParam:
  type: string
  format: uuid

GenericSuccessResponse:
  type: object
  required: [message, ok]
  properties:
    message:
      type: string
    ok:
      type: boolean
      example: true
    status:
      type: integer
      example: 200
    item:
      nullable: true
      additionalProperties: true

GenericErrorResponse:
  oneOf:
    - type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
          example: false
        message:
          type: string
    - type: object
      required: [message, ok, status]
      properties:
        message:
          type: string
        ok:
          type: boolean
          example: false
        status:
          type: integer
        item:
          nullable: true
        code:
          type: string

