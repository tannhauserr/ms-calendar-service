      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/GenericErrorResponse"

clientAdd:
  post:
    tags: [Event Client]
    summary: Create client appointment
    description: Creates a new booking from client-side flow.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/index.yaml#/ClientAddRequest"
          examples:
            create:
              value:
                idCompany: "2fd3e7b0-10d1-45bf-80d4-00f92ff97a31"
                idWorkspace: "29f8a525-d3f2-4bc2-89bb-f0f1f1958de9"
                startLocalISO: "2026-02-20T10:00:00"
                timeZoneClient: "Europe/Madrid"
                attendees:
                  - serviceId: "dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb"
                    durationMin: 60
                customer:
                  id: "a2a81aad-d012-41b8-8c4e-aa5c2e6aa356"
                  name: "Jane Doe"
            invalidClient:
              summary: Cliente inválido (debe fallar en modo mock)
              value:
                idCompany: "2fd3e7b0-10d1-45bf-80d4-00f92ff97a31"
                idWorkspace: "29f8a525-d3f2-4bc2-89bb-f0f1f1958de9"
                startLocalISO: "2026-02-20T10:00:00"
                timeZoneClient: "Europe/Madrid"
                attendees:
                  - serviceId: "dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb"
                    durationMin: 60
                customer:
                  id: "00000000-0000-4000-8000-000000000002"
                  name: "Jane Doe"
            invalidWorkspace:
              summary: Workspace inválido (debe fallar en modo mock)
              value:
                idCompany: "2fd3e7b0-10d1-45bf-80d4-00f92ff97a31"
                idWorkspace: "00000000-0000-4000-8000-000000000001"
                startLocalISO: "2026-02-20T10:00:00"
                timeZoneClient: "Europe/Madrid"
                attendees:
                  - serviceId: "dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb"
                    durationMin: 60
                customer:
                  id: "a2a81aad-d012-41b8-8c4e-aa5c2e6aa356"
                  name: "Jane Doe"
            createWithConfigOverrides:
              summary: Demo - sobrescribe bookingWindow/limits para esta petición
              value:
                idCompany: "2fd3e7b0-10d1-45bf-80d4-00f92ff97a31"
                idWorkspace: "29f8a525-d3f2-4bc2-89bb-f0f1f1958de9"
                startLocalISO: "2026-02-20T10:00:00"
                timeZoneClient: "Europe/Madrid"
                attendees:
                  - serviceId: "dc3f6ee6-7ac3-4d56-9f23-cdbaf936f8bb"
                    durationMin: 60
                customer:
                  id: "a2a81aad-d012-41b8-8c4e-aa5c2e6aa356"
                  name: "Jane Doe"
                configOverrides:
                  bookingWindow:
                    minLeadTimeMin: 0
                    maxAdvanceDays: 365
                  limits:
                    perUserPerDay: 10
                    perUserConcurrent: 10
                    maxServicesPerBooking: 2
    responses:
      "200":
        description: Appointment created or already joined
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/GenericSuccessResponse"
      "201":
        description: Appointment created
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/GenericSuccessResponse"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/GenericErrorResponse"
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/GenericErrorResponse"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/GenericErrorResponse"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "../schemas/index.yaml#/GenericErrorResponse"

